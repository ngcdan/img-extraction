<!DOCTYPE html>
<html>
  <head>
    <title>Tải Biên Lai</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <div class="container">
      <h1>Tải Biên Lai Tự Động</h1>

      <div class="upload-section">
        <div class="upload-form">
          <div class="file-drop-zone" id="dropZone">
            <input type="file" id="upload-file" accept=".pdf" style="display: none;">
            <div class="drop-zone-content">
              <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24">
                <path
                  d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z" />
              </svg>
              <div class="drop-text">
                <span class="primary-text">Kéo thả file Thông báo nộp phí vào đây</span>
                <span class="secondary-text">hoặc</span>
                <button class="browse-btn" onclick="document.getElementById('upload-file').click()">Chọn file</button>
              </div>
              <div class="file-info" style="display: none;">
                <span class="file-name"></span>
                <button class="remove-file" onclick="removeFile()">×</button>
              </div>
            </div>
          </div>
          <small class="hint">Chỉ chấp nhận file .pdf</small>
          <button class="extract-btn" onclick="uploadFile()" disabled>Trích xuất thông tin</button>
        </div>
      </div>

      <div class="form-container"
        style="display: flex; flex-direction: column; align-items: center; max-width: 500px; margin: 0 auto;">

        <div class="input-group" style="width: 100%;">
          <label for="username">
            Mã số thuế <span class="required">*</span>
          </label>
          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="Nhập mã số thuế">
        </div>

        <button
          class="download-btn"
          onclick="startDownload()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Bắt đầu tải
        </button>
      </div>

      <div id="status" class="status-container" style="display: none;">
        <h2>Trạng thái tải</h2>
        <div class="progress-bar">
          <div id="progress" class="progress"></div>
        </div>
        <p>Đã tải: <span id="current">0</span>/<span id="total">0</span></p>
        <p>Thành công: <span id="success">0</span></p>
        <p>Thất bại: <span id="failed">0</span></p>
      </div>

      <div id="message" class="message"></div>
    </div>

    <div id="toast-container"></div>

    <!-- Thêm Socket.IO client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <script>

        // Khởi tạo Socket.IO với long-polling
        const socket = io({
            transports: ['polling'],
            upgrade: false,
            reconnection: true,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000,
            reconnectionAttempts: Infinity
        });

        socket.on('connect', () => {
            console.log('Connected to server');
        });

        socket.on('disconnect', () => {
            console.log('Disconnected from server');
        });

        socket.on('notification', (data) => {
            showNotification(data.message, data.type);
        });

        // Hàm tạo và hiển thị toast
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;

            container.appendChild(toast);

            // Hiệu ứng hiển thị
            setTimeout(() => toast.classList.add('show'), 100);

            // Tự động ẩn sau 3 giây
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => container.removeChild(toast), 300);
            }, 3000);
        }

        // Lắng nghe sự kiện notification từ server
        socket.on('notification', function(data) {
            showToast(data.message, data.type);
        });

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('upload-file');
const fileInfo = document.querySelector('.file-info');
const fileName = document.querySelector('.file-name');
const extractBtn = document.querySelector('.extract-btn');
const dropZoneContent = document.querySelector('.drop-zone-content');

// Prevent default drag behaviors
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
  dropZone.addEventListener(eventName, preventDefaults, false);
  document.body.addEventListener(eventName, preventDefaults, false);
});

function preventDefaults (e) {
  e.preventDefault();
  e.stopPropagation();
}

// Highlight drop zone when item is dragged over it
['dragenter', 'dragover'].forEach(eventName => {
  dropZone.addEventListener(eventName, highlight, false);
});

['dragleave', 'drop'].forEach(eventName => {
  dropZone.addEventListener(eventName, unhighlight, false);
});

function highlight(e) {
  dropZone.classList.add('drag-over');
}

function unhighlight(e) {
  dropZone.classList.remove('drag-over');
}

// Handle dropped files
dropZone.addEventListener('drop', handleDrop, false);

function handleDrop(e) {
  const dt = e.dataTransfer;
  const files = dt.files;

  if (files.length > 0) {
    handleFiles(files);
  }
}

// Handle file selection
fileInput.addEventListener('change', function() {
  handleFiles(this.files);
});

function handleFiles(files) {
  if (files.length > 0) {
    const file = files[0];
    if (file.type === 'application/pdf') {
      showFileInfo(file);
      fileInput.files = files; // Update file input
      extractBtn.disabled = false;
    } else {
      showMessage('Chỉ chấp nhận file .pdf', 'error');
      removeFile();
    }
  }
}

function showFileInfo(file) {
  fileName.textContent = file.name;
  fileInfo.style.display = 'flex';
  dropZoneContent.querySelector('.drop-text').style.display = 'none';
  dropZoneContent.querySelector('.upload-icon').style.display = 'none';
}

function removeFile() {
  fileInput.value = '';
  fileInfo.style.display = 'none';
  dropZoneContent.querySelector('.drop-text').style.display = 'flex';
  dropZoneContent.querySelector('.upload-icon').style.display = 'block';
  extractBtn.disabled = true;
}

function uploadFile() {
  const file = fileInput.files[0];
  if (!file) {
    showMessage('Vui lòng chọn file', 'error');
    return;
  }

  const formData = new FormData();
  formData.append('file', file);

  extractBtn.disabled = true;
  extractBtn.textContent = 'Đang xử lý...';

  fetch('/upload', {
    method: 'POST',
    body: formData
  })
  .then(response => response.json())
  .then(data => {
    if (data.error) {
      showMessage(data.error, 'error');
    } else {
      // Tự động điền thông tin vào form
      const usernameInput = document.getElementById('username');

      if (data.data.tax_number) {
        usernameInput.value = data.data.tax_number;
        usernameInput.classList.add('filled');
        setTimeout(() => usernameInput.classList.remove('filled'), 2000);
      }

      showMessage('Đã điền thông tin từ file', 'success');
    }
  })
  .catch(error => {
    showMessage('Lỗi khi upload: ' + error.message, 'error');
  })
  .finally(() => {
    extractBtn.disabled = false;
    extractBtn.textContent = 'Trích xuất thông tin';
  });
}

function startDownload() {
  const username = document.getElementById('username').value.trim();

  if (!username) {
    showToast('Vui lòng nhập mã số thuế', 'error');
    return;
  }

  if (!/^\d+$/.test(username)) {
    showToast('Mã số thuế chỉ được chứa số', 'error');
    return;
  }

  // Disable nút download và hiển thị trạng thái loading
  const downloadBtn = document.querySelector('button[onclick="startDownload()"]');
  if (downloadBtn) {
    downloadBtn.disabled = true;
    downloadBtn.textContent = 'Đang xử lý...';
  }

  // Reset và hiển thị status container
  const statusContainer = document.getElementById('status');
  if (statusContainer) {
    statusContainer.style.display = 'block';
    document.getElementById('current').textContent = '0';
    document.getElementById('total').textContent = '0';
    document.getElementById('success').textContent = '0';
    document.getElementById('failed').textContent = '0';
    document.getElementById('progress').style.width = '0%';
  }

  // Gửi request
  fetch('/start', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
    },
    body: new URLSearchParams({
      'username': username
    })
  })
  .then(response => {
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    return response.json();
  })
  .then(data => {
    if (data.error) {
      showToast(data.error, 'error');
    } else {
      showToast('Bắt đầu tải...', 'info');
      startStatusCheck();
    }
  })
  .catch(error => {
    console.error('Error:', error);
    showToast('Lỗi khi gửi yêu cầu: ' + error.message, 'error');
  })
  .finally(() => {
    // Enable lại nút download
    if (downloadBtn) {
      downloadBtn.disabled = false;
      downloadBtn.textContent = 'Bắt đầu tải';
    }
  });
}

function startStatusCheck() {
  const statusCheck = setInterval(() => {
    fetch('/status')
    .then(response => response.json())
    .then(data => {
      updateStatus(data);
      if (data.status === 'completed' || data.status === 'error') {
        clearInterval(statusCheck);
      }
    })
    .catch(error => {
      console.error('Error fetching status:', error);
      clearInterval(statusCheck);
    });
  }, 1000);
}

function updateStatus(data) {
  document.getElementById('current').textContent = data.current;
  document.getElementById('total').textContent = data.total;
  document.getElementById('success').textContent = data.success;
  document.getElementById('failed').textContent = data.failed;

  if (data.total > 0) {
    const progress = (data.current / data.total) * 100;
    document.getElementById('progress').style.width = `${progress}%`;
  }

  if (data.status === 'completed') {
    showMessage('Tải xuống hoàn tất!', 'success');
  } else if (data.status === 'error') {
    showMessage('Đã xảy ra lỗi!', 'error');
  }
}

function showMessage(message, type) {
  const messageDiv = document.getElementById('message');
  messageDiv.textContent = message;
  messageDiv.className = `message ${type}`;
}
    </script>
  </body>
</html>
